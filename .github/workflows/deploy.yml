# =============================================================================
# CI/CD — GJ Logística
# =============================================================================
# Pipeline:
#   1. test   → corre en TODOS los push y PRs (incluye branches)
#   2. deploy → solo en push a `main`, después de que pasen los tests
#
# Infraestructura:
#   - Backend:  PM2 → NestJS en puerto 4001
#   - Frontend: Nginx en puerto 3001 (sirve SPA + proxy /api/ → 4001)
#   - Dominio:  gj-logistica.luciano-yomayel.com
# =============================================================================

name: CI/CD — GJ Logística

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================================
  # JOB 1 — Tests del backend
  # Se ejecuta en todos los push y pull_requests
  # ============================================================================
  test:
    name: Tests Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias del backend
        working-directory: backend
        run: npm ci

      - name: Correr tests
        working-directory: backend
        run: npm test -- --forceExit --testTimeout=30000

  # ============================================================================
  # JOB 2 — Build y Deploy
  # Solo corre cuando hay push a `main` y después de que pasen los tests
  # ============================================================================
  deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # ── BUILD BACKEND ───────────────────────────────────────────────────────
      - name: Instalar dependencias del backend
        working-directory: backend
        run: npm ci

      - name: Compilar backend (nest build)
        working-directory: backend
        run: npm run build

      # ── BUILD FRONTEND ──────────────────────────────────────────────────────
      - name: Instalar dependencias del frontend
        working-directory: frontend
        run: npm ci

      - name: Compilar frontend (vite build)
        working-directory: frontend
        run: npm run build
        env:
          # URL que usa el browser para llamar a la API
          # Nginx en :3001 intercepta /api/ y lo proxea a :4001
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # ── SETUP SSH ───────────────────────────────────────────────────────────
      - name: Configurar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Agregar host a known_hosts para evitar prompt interactivo
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT }} -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # ── DEPLOY BACKEND ──────────────────────────────────────────────────────
      # Sincronizamos:
      #   - src/          → necesario para que migration:run funcione con ts-node
      #   - dist/         → el JS compilado que ejecuta PM2
      #   - package.json + package-lock.json → para npm ci en el servidor
      #   - nest-cli.json + tsconfig*.json   → para la compilación
      # Excluimos node_modules y .env (el .env vive solo en el servidor)
      - name: Deploy backend al servidor
        run: |
          rsync -avz --delete \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude '.git' \
            --exclude '*.spec.ts' \
            --exclude 'coverage' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }}" \
            backend/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/backend/

      # ── DEPLOY FRONTEND ─────────────────────────────────────────────────────
      # Solo sincronizamos el dist/ generado por Vite (archivos estáticos)
      - name: Deploy frontend al servidor
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }}" \
            frontend/dist/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/gj-logistica/frontend/dist/

      # ── DEPLOY CONFIGS ──────────────────────────────────────────────────────
      - name: Deploy ecosystem.config.js y nginx.conf
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }}" \
            ecosystem.config.js \
            nginx.conf \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/

      # ── ACTIVAR EN EL SERVIDOR ──────────────────────────────────────────────
      # Pasos:
      #   1. npm ci       → instala deps (incluyendo devDeps para ts-node/migrations)
      #   2. migration:run → aplica migraciones pendientes (idempotente)
      #   3. pm2 reload   → reinicio sin downtime (fallback a start si es primera vez)
      #   4. pm2 save     → persiste la lista de procesos para reboot del servidor
      #   5. nginx        → copia config, valida sintaxis, recarga
      - name: Aplicar migraciones + reiniciar servicios
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.DEPLOY_PORT }} \
              -o StrictHostKeyChecking=no \
              ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
              "set -e

               echo '========================================='
               echo '  GJ Logística — Deploy iniciado'
               echo '========================================='

               echo ''
               echo '→ [1/5] Instalando dependencias del backend...'
               cd ${{ secrets.DEPLOY_PATH }}/backend
               npm ci

               echo ''
               echo '→ [2/5] Aplicando migraciones de base de datos...'
               npm run migration:run

               echo ''
               echo '→ [3/5] Reiniciando backend con PM2...'
               cd ${{ secrets.DEPLOY_PATH }}
               pm2 reload ecosystem.config.js --only gj-backend 2>/dev/null || \
               pm2 start  ecosystem.config.js --only gj-backend

               echo ''
               echo '→ [4/5] Guardando lista de procesos PM2...'
               pm2 save

               echo ''
               echo '→ [5/5] Actualizando configuración de Nginx...'
               sudo cp ${{ secrets.DEPLOY_PATH }}/nginx.conf /etc/nginx/sites-available/gj-logistica
               # Crear symlink si no existe
               sudo ln -sf /etc/nginx/sites-available/gj-logistica \
                            /etc/nginx/sites-enabled/gj-logistica
               sudo nginx -t
               sudo systemctl reload nginx

               echo ''
               echo '========================================='
               echo '  ✅ Deploy completado con éxito!'
               echo '   URL: http://gj-logistica.luciano-yomayel.com:3001'
               echo '========================================='
              "
