# nginx.conf — GJ Logística
# =============================================================================
# Colocar en: /etc/nginx/sites-available/gj-logistica
#
# Reglas de routing:
#   - 104.131.48.172 (IP directa)          → Dolibarr (vía default_server del archivo 'dolibarr')
#   - corteva.gj-logistica.app             → Dolibarr (archivo 'dolibarr')
#   - gj-logistica.app                     → React SPA + NestJS API (este archivo)
#
# Puertos:
#   80   → redirección a 443
#   443  → frontend React + proxy /api → localhost:3000
#   3000 → NestJS/PM2 (solo acceso local)
# =============================================================================

# HTTP → HTTPS redirect para gj-logistica.app
server {
    listen 80;
    listen [::]:80;
    server_name gj-logistica.app www.gj-logistica.app;
    return 301 https://gj-logistica.app$request_uri;
}

# HTTPS — React SPA + API proxy
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name gj-logistica.app www.gj-logistica.app;

    ssl_certificate /etc/letsencrypt/live/gj-logistica.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gj-logistica.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Frontend (React SPA) ──────────────────────────────────────────────────
    root /var/www/gj-logistica/frontend/dist;
    index index.html;
    client_max_body_size 16M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # Cache agresivo para assets con hash
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API Backend (proxy inverso a NestJS en puerto 3000) ──────────────────
    # Debe ir ANTES de la regla SPA para que /api no caiga en el fallback
    location /api {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # SPA fallback: todas las rutas del router van al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
