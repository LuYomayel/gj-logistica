# nginx.conf — GJ Logística
# =============================================================================
# Colocar en: /etc/nginx/sites-available/gj-logistica
# Activar con:
#   sudo ln -s /etc/nginx/sites-available/gj-logistica /etc/nginx/sites-enabled/gj-logistica
#   sudo nginx -t && sudo systemctl reload nginx
#
# Puertos usados:
#   3001 → nginx (frontend React SPA + proxy API)
#   4001 → NestJS/PM2 (backend, solo acceso local)
# =============================================================================

server {
    listen 3001;
    server_name gj-logistica.luciano-yomayel.com;

    # ── Frontend (React SPA) ──────────────────────────────────────────────────
    root /var/www/gj-logistica/frontend/dist;
    index index.html;

    # Gzip para reducir tamaño de transferencia
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # Cache agresivo para assets con hash (Vite los genera con hash en el nombre)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: todas las rutas del router van al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Backend (proxy inverso a NestJS en puerto 4001) ──────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:4001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Timeout para operaciones largas (ETL, exports CSV, generación PDFs)
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}

