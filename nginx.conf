# nginx.conf — GJ Logística
# Colocar en: /etc/nginx/sites-available/gj-logistica
# Activar con: ln -s /etc/nginx/sites-available/gj-logistica /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name gj-logistica.com www.gj-logistica.com;
    # Redirigir HTTP → HTTPS (descomentar si tenés SSL)
    # return 301 https://$host$request_uri;

    # ── Frontend (React SPA) ──────────────────────────────────────────
    root /var/www/gj-logistica/frontend/dist;
    index index.html;

    # Gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # Cache agresivo para assets con hash (Vite los genera con hash en el nombre)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: todas las rutas apuntan al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Backend (proxy inverso a NestJS en puerto 3000) ───────────
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Timeout para operaciones largas (ETL, exports CSV)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

